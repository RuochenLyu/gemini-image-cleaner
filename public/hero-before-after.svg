<svg xmlns="http://www.w3.org/2000/svg" viewBox="120 80 560 300" width="100%" height="100%" role="img" aria-label="Remove Gemini watermark — before and after">
  <defs>
    <style>
      .paper { fill: #FFFDF7; stroke: #F5EDD6; stroke-width: 1px; }
      .shadow { filter: url(#card-shadow); }
      .glow { filter: url(#glow-shadow); }
      .dash { stroke: #E8DFC8; stroke-width: 1.5; stroke-dasharray: 6 6; stroke-linecap: round; }
      .badge-wm { fill: url(#gemini-grad); }
      .badge-ok { fill: url(#banana-grad); }
      .badge-text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-weight: 700; fill: white; letter-spacing: 0.3px; }
      .skel-1 { fill: #F5EDD6; }
      .skel-2 { fill: #E8DFC8; }
      .skel-3 { fill: #D6CCAB; }
    </style>

    <linearGradient id="gemini-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    <linearGradient id="banana-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <linearGradient id="success-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>

    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#78716C" flood-opacity="0.04"/>
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#78716C" flood-opacity="0.07"/>
    </filter>
    <filter id="glow-shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#F59E0B" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#78716C" flood-opacity="0.06"/>
    </filter>

    <clipPath id="img-clip">
      <rect width="128" height="94" rx="8" />
    </clipPath>
  </defs>

  <g transform="translate(0, 10)">
    <!-- Connecting dashed line -->
    <line class="dash" x1="270" y1="225" x2="530" y2="225" />

    <!-- ===== LEFT CARD: with watermark ===== -->
    <g transform="translate(255, 225) rotate(-3)">
      <g class="shadow">
        <rect class="paper" x="-84" y="-116" width="168" height="232" rx="14" />
      </g>

      <g transform="translate(-64, -92)">
        <!-- Badge -->
        <rect width="42" height="22" rx="6" class="badge-wm" />
        <text x="21" y="15" class="badge-text" font-size="10" text-anchor="middle">IMG</text>
        <rect x="52" y="8" width="72" height="5" rx="2.5" class="skel-1" />

        <!-- Image area -->
        <g transform="translate(0, 34)">
          <rect width="128" height="94" rx="8" class="skel-1" />
          <g clip-path="url(#img-clip)">
            <!-- Landscape -->
            <path d="M0 62 Q30 32 64 48 T140 28 L140 94 L0 94Z" class="skel-2" />
            <circle cx="96" cy="24" r="13" class="skel-3" opacity="0.4" />

            <!-- Gemini watermark spark -->
            <g transform="translate(106, 72)" fill="url(#gemini-grad)" opacity="0.85">
              <path d="M0-12C0-12 1.5-6.5 3-4.8C4.8-3 8.5-2.2 8.5-2.2S4.8-1.3 3 0.4C1.5 2.2 0 7.8 0 7.8S-1.5 2.2-3 0.4C-4.8-1.3-8.5-2.2-8.5-2.2S-4.8-3-3-4.8C-1.5-6.5 0-12 0-12Z" />
              <path transform="translate(8.5,8.5) scale(0.5)" d="M0-12C0-12 1.5-6.5 3-4.8C4.8-3 8.5-2.2 8.5-2.2S4.8-1.3 3 0.4C1.5 2.2 0 7.8 0 7.8S-1.5 2.2-3 0.4C-4.8-1.3-8.5-2.2-8.5-2.2S-4.8-3-3-4.8C-1.5-6.5 0-12 0-12Z" opacity="0.7"/>
            </g>
          </g>
        </g>

        <!-- Skeleton text rows -->
        <g transform="translate(0, 144)" class="skel-2">
          <rect width="128" height="5" rx="2.5" />
          <rect y="14" width="100" height="5" rx="2.5" />
          <rect y="28" width="64" height="5" rx="2.5" />
        </g>
      </g>
    </g>

    <!-- ===== RIGHT CARD: clean ===== -->
    <g transform="translate(545, 225) rotate(3)">
      <!-- Soft glow behind -->
      <rect x="-94" y="-126" width="188" height="252" rx="20" fill="#FEF9E7" opacity="0.5" filter="blur(10px)" />

      <g class="shadow">
        <rect class="paper" x="-84" y="-116" width="168" height="232" rx="14" />
      </g>

      <g transform="translate(-64, -92)">
        <!-- Badge -->
        <rect width="42" height="22" rx="6" class="badge-ok" />
        <text x="21" y="15" class="badge-text" font-size="10" text-anchor="middle">IMG</text>
        <rect x="52" y="8" width="72" height="5" rx="2.5" class="skel-1" />

        <!-- Image area — no watermark -->
        <g transform="translate(0, 34)">
          <rect width="128" height="94" rx="8" class="skel-1" />
          <g clip-path="url(#img-clip)">
            <path d="M0 62 Q30 32 64 48 T140 28 L140 94 L0 94Z" class="skel-2" />
            <circle cx="96" cy="24" r="13" class="skel-3" opacity="0.4" />
          </g>

          <!-- Small success check -->
          <g transform="translate(114, 78)">
            <circle r="10" fill="url(#success-grad)" opacity="0.9" />
            <path d="M-4 0.5 L-1.5 3 L4-2.5" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </g>
        </g>

        <!-- Skeleton text rows -->
        <g transform="translate(0, 144)" class="skel-2">
          <rect width="128" height="5" rx="2.5" />
          <rect y="14" width="100" height="5" rx="2.5" />
          <rect y="28" width="64" height="5" rx="2.5" />
        </g>
      </g>
    </g>

    <!-- ===== CENTER ARROW ===== -->
    <g transform="translate(400, 225)">
      <circle r="28" fill="#FFFDF7" class="glow" />
      <circle r="28" fill="none" stroke="#F5EDD6" stroke-width="1" />

      <g transform="scale(1.4)">
        <path d="M-3-5 L4 0 L-3 5" fill="none" stroke="#92400E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
        <line x1="-6" y1="0" x2="3" y2="0" stroke="#92400E" stroke-width="2.5" stroke-linecap="round" />
      </g>
    </g>
  </g>
</svg>
