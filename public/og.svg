<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFBEB"/>
      <stop offset="1" stop-color="#FEF3C7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="260" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#92400E" stroke-width="1" transform="translate(120,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#92400E" stroke-width="1" transform="translate(240,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#92400E" stroke-width="1" transform="translate(360,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#92400E" stroke-width="1" transform="translate(480,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#92400E" stroke-width="1" transform="translate(600,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#92400E" stroke-width="1" transform="translate(720,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#92400E" stroke-width="1" transform="translate(840,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#92400E" stroke-width="1" transform="translate(960,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#92400E" stroke-width="1" transform="translate(1080,0)"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="200" fill="#F59E0B" opacity="0.06"/>
  <circle cx="100" cy="550" r="160" fill="#F59E0B" opacity="0.05"/>
  <circle cx="900" cy="520" r="120" fill="#65A30D" opacity="0.04"/>

  <!-- Main card -->
  <rect x="80" y="80" width="1040" height="470" rx="32" fill="white" opacity="0.7"/>
  <rect x="80" y="80" width="1040" height="470" rx="32" fill="none" stroke="#E5D5A0" stroke-width="2"/>

  <!-- Banana icon -->
  <g transform="translate(160, 140) scale(0.7)">
    <circle cx="60" cy="60" r="56" fill="#FDE68A" opacity="0.5"/>
    <path d="M45 10C55 25 62 44 64 67C70 134 23 231 -48 290C-109 342 -177 360 -220 338C-173 352 -106 329 -47 279C17 225 58 137 54 75C53 52 49 31 45 10Z" fill="#F2C44D" transform="translate(100, -20) scale(0.35)"/>
    <path d="M19 -7C40 -10 59 -4 78 15C75 28 68 39 56 46C37 37 24 21 19 -7Z" fill="#65A30D" transform="translate(100, -20) scale(0.35)"/>
    <path d="M35 15C50 30 55 55 52 80C48 110 30 140 5 155C-10 145 -5 120 5 100C15 78 25 55 35 15Z" fill="#FBBF24" transform="translate(30, -5) scale(0.6)"/>
    <path d="M10 5C15 2 22 5 25 12C20 18 13 20 8 15C5 12 6 8 10 5Z" fill="#65A30D" transform="translate(52, -8) scale(0.7)"/>
  </g>

  <!-- Title -->
  <text x="340" y="210" fill="#451A03" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="800" letter-spacing="-1">
    Gemini Image Cleaner
  </text>

  <!-- Subtitle -->
  <text x="340" y="270" fill="#78350F" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="400">
    Remove Gemini watermarks locally in your browser
  </text>

  <!-- Feature pills -->
  <g transform="translate(340, 310)">
    <rect x="0" y="0" width="140" height="40" rx="20" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="70" y="26" fill="#92400E" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" text-anchor="middle">Batch Upload</text>

    <rect x="160" y="0" width="140" height="40" rx="20" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="230" y="26" fill="#92400E" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" text-anchor="middle">100% Private</text>

    <rect x="320" y="0" width="160" height="40" rx="20" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="400" y="26" fill="#92400E" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" text-anchor="middle">ZIP Download</text>

    <rect x="500" y="0" width="190" height="40" rx="20" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="595" y="26" fill="#92400E" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" text-anchor="middle">Before/After Preview</text>
  </g>

  <!-- Algorithm badge -->
  <g transform="translate(340, 380)">
    <rect x="0" y="0" width="320" height="44" rx="22" fill="url(#accent)"/>
    <text x="160" y="29" fill="white" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" text-anchor="middle">Smart Detection + Gain Calibration</text>
  </g>

  <!-- Open source + URL -->
  <text x="340" y="480" fill="#A16207" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="500">
    Open source &amp; free  ·  banana.aix4u.com
  </text>

  <!-- Bottom accent line -->
  <rect x="80" y="568" width="1040" height="4" rx="2" fill="#F59E0B" opacity="0.3"/>
</svg>
