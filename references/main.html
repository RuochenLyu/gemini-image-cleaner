<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title data-i18n="app_title_local_tool">
      Gemini AI Watermark Remover - Local Tool
    </title>
    <style>
      :root {
        --bg: #ffffff;
        --surface: #ffffff;
        --surface-2: #f7f3ea;
        --border: #e9e1d0;
        --text: #4a3a21;
        --text-secondary: #5d4a2b;
        --text-muted: #7a6a45;
        --accent: #f4c531;
        --accent-strong: #d79a06;
        --accent-soft: #fff1b3;
        --accent-leaf: #6fa541;
        --accent-leaf-strong: #4d7f29;
        --success: #6fa541;
        --error: #e0663a;
        --warning: #f0b13a;
        --shadow: 0 18px 40px rgba(120, 88, 20, 0.12);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        width: 100%;
        min-width: 360px;
        font-family:
          "Trebuchet MS", "Verdana", "Tahoma", "PingFang SC", "Microsoft YaHei",
          sans-serif;
        color: var(--text);
        background: var(--bg);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      .bg-gradient {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 60% 40% at 16% 10%,
            rgba(244, 197, 49, 0.1) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 70% 50% at 88% 18%,
            rgba(111, 165, 65, 0.1) 0%,
            transparent 75%
          ),
          linear-gradient(180deg, #ffffff 0%, #ffffff 55%, #fbf7ec 100%);
        pointer-events: none;
        z-index: 0;
      }

      .grid-pattern {
        position: fixed;
        inset: 0;
        background-image: radial-gradient(
          rgba(90, 70, 32, 0.08) 1px,
          transparent 1px
        );
        background-size: 36px 36px;
        pointer-events: none;
        z-index: 1;
        mask-image: radial-gradient(
          ellipse 70% 70% at 50% 30%,
          black,
          transparent
        );
      }

      .scanlines {
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 7px,
          rgba(255, 255, 255, 0.12) 7px,
          rgba(255, 255, 255, 0.12) 9px
        );
        opacity: 0.25;
        pointer-events: none;
        z-index: 2;
      }

      .page {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 720px;
        padding: 40px 24px 60px;
        margin: 0 auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      .hero {
        text-align: center;
        padding: 10px 0 10px;
        animation: fadeUp 600ms ease both;
      }

      .hero-illustration {
        width: 120px;
        height: 80px;
        margin: 8px auto 6px;
        display: grid;
        place-items: center;
      }

      .hero-illustration svg {
        width: 100%;
        height: 100%;
      }

      .hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        background: var(--accent-soft);
        border: 1px solid rgba(215, 154, 6, 0.35);
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        color: var(--accent-strong);
        letter-spacing: 0.08em;
        margin-bottom: 16px;
        text-transform: uppercase;
      }

      .hero-badge::before {
        content: "";
        width: 7px;
        height: 7px;
        background: var(--accent-leaf);
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }

      .title {
        font-family: "Georgia", "Times New Roman", "STKaiti", serif;
        font-size: clamp(34px, 6vw, 52px);
        font-weight: 700;
        letter-spacing: 0.01em;
        line-height: 1.05;
        margin-bottom: 12px;
      }

      .title-gradient {
        background: linear-gradient(
          135deg,
          #4a3a21 0%,
          #f4c531 60%,
          #d79a06 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        font-size: 15px;
        color: var(--text-muted);
        max-width: 460px;
        margin: 0 auto;
        line-height: 1.7;
      }

      .subtitle code {
        font-family:
          "Trebuchet MS", "Verdana", "Tahoma", "PingFang SC", "Microsoft YaHei",
          sans-serif;
        font-size: 12px;
        padding: 2px 6px;
        background: #fffdf3;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--accent-strong);
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 26px;
        position: relative;
        overflow: hidden;
        box-shadow: var(--shadow);
        animation: fadeUp 600ms ease both;
        animation-delay: 100ms;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at top left,
          rgba(244, 197, 49, 0.07),
          transparent 75%
        );
        opacity: 0.9;
        pointer-events: none;
      }

      .dropzone {
        width: 100%;
        min-height: 200px;
        border: 2px dashed rgba(111, 165, 65, 0.4);
        background: linear-gradient(
          180deg,
          rgba(244, 197, 49, 0.04) 0%,
          rgba(247, 243, 234, 0.25) 100%
        );
        border-radius: 18px;
        padding: 36px 24px;
        cursor: pointer;
        transition: all 250ms ease;
        position: relative;
        overflow: hidden;
      }

      .dropzone::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 50% 40%,
          rgba(111, 165, 65, 0.16) 0%,
          transparent 70%
        );
        opacity: 0;
        transition: opacity 300ms ease;
      }

      .dropzone:hover {
        border-color: rgba(111, 165, 65, 0.75);
        transform: translateY(-2px);
        box-shadow: 0 12px 30px rgba(120, 88, 20, 0.15);
      }

      .dropzone:hover::before {
        opacity: 1;
      }

      .dropzone.dragover {
        border-color: var(--accent-strong);
        background: linear-gradient(
          180deg,
          rgba(244, 197, 49, 0.08) 0%,
          rgba(247, 243, 234, 0.3) 100%
        );
        transform: translateY(-3px) scale(1.01);
        box-shadow: 0 16px 40px rgba(120, 88, 20, 0.2);
      }

      .dropzone-inner {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .upload-icon {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: #ffffff;
        border: 1px solid rgba(215, 154, 6, 0.35);
        display: grid;
        place-items: center;
        color: var(--accent-strong);
        transition: all 300ms ease;
        box-shadow: 0 8px 20px rgba(200, 150, 20, 0.18);
      }

      .dropzone:hover .upload-icon {
        transform: translateY(-4px);
        box-shadow: 0 12px 26px rgba(170, 120, 10, 0.22);
      }

      .upload-icon svg {
        width: 28px;
        height: 28px;
        transition: transform 300ms ease;
      }

      .dropzone:hover .upload-icon svg {
        transform: scale(1.08);
      }

      .dropzone-text {
        text-align: center;
      }

      .dropzone-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 8px;
      }

      .dropzone-hint {
        font-size: 12px;
        color: var(--text-muted);
      }

      .dropzone-hint span {
        color: var(--accent-strong);
        font-weight: 600;
      }

      .file {
        display: none;
      }

      .status-bar {
        margin-top: 20px;
        padding: 14px 18px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .status-left {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .status-indicator {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--text-muted);
        flex-shrink: 0;
        transition: all 300ms ease;
      }

      .status-bar.ready .status-indicator {
        background: var(--accent-leaf);
        box-shadow: 0 0 10px rgba(111, 165, 65, 0.55);
        animation: glow 2s ease-in-out infinite;
      }

      @keyframes glow {
        0%,
        100% {
          box-shadow: 0 0 8px rgba(111, 165, 65, 0.3);
        }
        50% {
          box-shadow: 0 0 16px rgba(111, 165, 65, 0.6);
        }
      }

      .status-bar.processing .status-indicator {
        background: var(--warning);
        animation: processing 1s ease-in-out infinite;
      }

      @keyframes processing {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }

      .status-bar.error .status-indicator {
        background: var(--error);
      }

      .status-bar.warning .status-indicator {
        background: var(--warning);
      }

      .status-text {
        font-size: 12px;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .download-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        height: 38px;
        padding: 0 18px;
        border-radius: 999px;
        text-decoration: none;
        font-size: 12px;
        font-weight: 700;
        color: #4a3a21;
        background: linear-gradient(135deg, #ffe79a 0%, #f0bf24 100%);
        border: none;
        cursor: pointer;
        transition: all 200ms ease;
        flex-shrink: 0;
        box-shadow: 0 10px 20px rgba(188, 132, 10, 0.25);
      }

      .download-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 24px rgba(160, 105, 0, 0.3);
      }

      .download-btn:active {
        transform: translateY(0);
      }

      .download-btn svg {
        width: 14px;
        height: 14px;
      }

      .download-btn.disabled {
        pointer-events: none;
        opacity: 0.5;
        cursor: not-allowed;
      }

      .steps {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        animation: fadeUp 600ms ease both;
        animation-delay: 180ms;
      }

      .step {
        position: relative;
        padding: 18px 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        text-align: center;
        transition: all 250ms ease;
        box-shadow: 0 10px 24px rgba(120, 88, 20, 0.1);
      }

      .step:hover {
        border-color: rgba(215, 154, 6, 0.5);
        transform: translateY(-2px);
      }

      .step-number {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #fff6d5;
        border: 1px solid rgba(215, 154, 6, 0.4);
        display: inline-grid;
        place-items: center;
        font-size: 13px;
        font-weight: 700;
        color: var(--accent-strong);
        margin-bottom: 10px;
      }

      .step-text {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
        line-height: 1.4;
      }

      .step:not(:last-child)::after {
        content: "";
        position: absolute;
        top: 33px;
        right: -8px;
        width: 16px;
        height: 2px;
        background: linear-gradient(
          90deg,
          rgba(215, 154, 6, 0.5),
          rgba(111, 165, 65, 0.5)
        );
        z-index: 1;
      }

      .footer {
        margin-top: auto;
        padding-top: 30px;
        text-align: center;
        animation: fadeUp 600ms ease both;
        animation-delay: 220ms;
      }

      .lang-switch {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 999px;
        font-size: 11px;
        color: var(--text-muted);
        margin: 0 auto 12px;
      }

      .lang-select {
        font-family: inherit;
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #ffffff;
        color: var(--text);
      }

      .footer-content {
        display: inline-flex;
        align-items: center;
        gap: 16px;
        padding: 12px 20px;
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: 999px;
        box-shadow: 0 12px 30px rgba(120, 88, 20, 0.1);
      }

      .footer-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--text-muted);
        font-weight: 600;
      }

      .footer-item svg {
        width: 12px;
        height: 12px;
        color: var(--accent-leaf-strong);
        opacity: 0.8;
      }

      .footer-divider {
        width: 1px;
        height: 12px;
        background: var(--border);
      }

      @media (max-width: 520px) {
        .page {
          padding: 24px 16px 40px;
        }

        .title {
          font-size: 30px;
        }

        .steps {
          grid-template-columns: 1fr;
          gap: 10px;
        }

        .step:not(:last-child)::after {
          display: none;
        }

        .status-bar {
          flex-direction: column;
          align-items: stretch;
          gap: 12px;
        }

        .download-btn {
          justify-content: center;
        }
      }

      .dropzone.loading .upload-icon {
        animation: bounce 1s ease-in-out infinite;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.5;
          transform: scale(0.9);
        }
        50% {
          opacity: 1;
          transform: scale(1.1);
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-8px);
        }
        40% {
          transform: translateX(8px);
        }
        60% {
          transform: translateX(-6px);
        }
        80% {
          transform: translateX(6px);
        }
      }

      .dropzone.highlight {
        border-color: var(--error);
        animation: shake 0.5s ease;
        box-shadow: 0 0 20px rgba(224, 102, 58, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="bg-gradient"></div>
    <div class="grid-pattern"></div>
    <div class="scanlines"></div>

    <main class="page">
      <header class="hero">
        <div class="hero-badge" data-i18n="main_badge"></div>
        <h1 class="title">
          <span class="title-gradient" data-i18n="main_title"></span>
        </h1>
        <div class="hero-illustration" aria-hidden="true">
          <svg viewBox="0 0 180 120" fill="none">
            <path
              d="M120 18c20 10 34 30 38 52-8 16-27 26-52 26-30 0-52-10-74-28 4-18 16-34 34-44 18-10 38-12 54-6z"
              fill="#f4c531"
            />
            <path
              d="M124 24c16 10 26 26 30 42-6 12-22 20-40 20-24 0-42-8-58-22 4-14 12-26 26-34 14-8 28-10 42-6z"
              fill="#ffe27a"
            />
            <path
              d="M42 66c10 6 20 10 34 14-6 12-18 20-34 22-10-10-10-24 0-36z"
              fill="#6fa541"
            />
            <circle cx="138" cy="28" r="8" fill="#6fa541" />
            <circle cx="152" cy="44" r="5" fill="#6fa541" />
          </svg>
        </div>
        <p class="subtitle" data-i18n="main_subtitle"></p>
      </header>

      <section class="card">
        <button
          id="dropzone"
          class="dropzone"
          type="button"
          data-i18n-attr="aria-label:main_dropzone_aria"
        >
          <div class="dropzone-inner">
            <div class="upload-icon" aria-hidden="true">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
              </svg>
            </div>
            <div class="dropzone-text">
              <div class="dropzone-title" data-i18n="main_dropzone_title"></div>
              <div class="dropzone-hint" data-i18n="main_dropzone_hint"></div>
            </div>
          </div>
        </button>

        <input
          id="file"
          class="file"
          type="file"
          accept="image/jpeg,image/png,image/webp"
        />

        <div id="statusBar" class="status-bar">
          <div class="status-left">
            <div class="status-indicator"></div>
            <div
              id="statusText"
              class="status-text"
              data-i18n="main_status_idle"
            ></div>
          </div>
          <a
            id="downloadBtn"
            class="download-btn"
            href="#"
            download="gemini-no-watermark.png"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            <span data-i18n="main_download"></span>
          </a>
        </div>
      </section>

      <section class="steps" data-i18n-attr="aria-label:main_steps_aria">
        <div class="step">
          <div class="step-number">1</div>
          <div class="step-text" data-i18n="main_step_1"></div>
        </div>
        <div class="step">
          <div class="step-number">2</div>
          <div class="step-text" data-i18n="main_step_2"></div>
        </div>
        <div class="step">
          <div class="step-number">3</div>
          <div class="step-text" data-i18n="main_step_3"></div>
        </div>
      </section>

      <footer class="footer">
        <div class="lang-switch">
          <span data-i18n="lang_label"></span>
          <select id="langSelectMain" class="lang-select">
            <option value="en_US">English</option>
            <option value="zh_CN">简体中文</option>
            <option value="zh_TW">繁體中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="pt_BR">Português</option>
            <option value="vi">Tiếng Việt</option>
          </select>
        </div>
        <div class="footer-content">
          <div class="footer-item">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            <span data-i18n="main_footer_privacy"></span>
          </div>
          <div class="footer-divider"></div>
          <div class="footer-item">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
            <span data-i18n="main_footer_fast"></span>
          </div>
        </div>
      </footer>
    </main>

    <script src="i18n.js"></script>
    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="engine.js"></script>
    <script src="main.js"></script>
  </body>
</html>
